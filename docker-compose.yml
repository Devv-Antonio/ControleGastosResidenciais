version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5054:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      # Mapeia a base de dados SQLite para não se perder quando o container reiniciar
      - ./Backend/gastos_residenciais.db:/app/gastos_residenciais.db